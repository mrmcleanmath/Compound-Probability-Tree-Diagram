<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Doubling & Halving Trainer – Mr. McLean Math</title>

<style>
:root{
  --bg:#0b0f14;
  --card:#121821;
  --ink:#e8eef6;
  --muted:#9bb0c9;
  --accent:#5cc8ff;
  --good:#36d399;
  --bad:#ff6b6b;
  --outline:#263041;
}
body{
  margin:0;
  font-family:system-ui;
  background:var(--bg);
  color:var(--ink);
}
.wrap{max-width:900px;margin:auto;padding:16px}
.card{
  background:var(--card);
  border:1px solid var(--outline);
  border-radius:14px;
  padding:12px;
  margin-bottom:12px;
}
select,input,button{
  padding:10px;
  border-radius:10px;
  border:1px solid var(--outline);
  background:#0e141b;
  color:var(--ink);
}
button{cursor:pointer}
.primary{background:var(--accent);color:#000;font-weight:700}

.question{
  font-size:clamp(32px,6vw,48px);
  font-weight:900;
  text-align:center;
  margin:20px 0;
}

.input{
  font-size:32px;
  text-align:center;
  width:220px;
}

.center{text-align:center}

.badges{display:flex;gap:8px;flex-wrap:wrap}
.badge{
  background:#0e141b;
  border:1px solid var(--outline);
  border-radius:999px;
  padding:6px 10px;
  font-size:13px;
}

.popup{
  position:fixed;
  bottom:20px;
  left:50%;
  transform:translateX(-50%);
  padding:10px 16px;
  border-radius:10px;
  font-weight:700;
}
.ok{background:var(--good);color:#002916}
.no{background:var(--bad);color:#240000}
</style>
</head>

<body>
<div class="wrap">

<div class="card">

<b>Skill</b><br>
<select id="skill">
  <option value="double">Doubling</option>
  <option value="half">Halving</option>
  <option value="mix">Mixed</option>
</select>

<br><br>

<b>Number Type</b><br>
<select id="type">
  <option value="whole">Whole Numbers</option>
  <option value="decimal">Decimals</option>
  <option value="mix">Mixed</option>
</select>

<br><br>

<b>Digits (whole numbers)</b><br>
<select id="digits">
  <option value="1">1 digit</option>
  <option value="2">2 digits</option>
  <option value="3" selected>3 digits</option>
  <option value="4">4 digits</option>
  <option value="5">5 digits</option>
  <option value="6">6 digits</option>
</select>

<br><br>

<b>Decimal places</b><br>
<select id="decimals">
  <option value="1" selected>1 decimal</option>
  <option value="2">2 decimals</option>
  <option value="3">3 decimals</option>
</select>

<br><br>

<b>Session</b><br>
<select id="session">
  <option value="mastery">Mastery</option>
  <option value="endless">Endless</option>
</select>

<br><br>

<label>
  <input type="checkbox" id="instant"> Instant Check
</label>

</div>

<div class="card" id="game" style="display:none">

<div class="badges">
  <div class="badge" id="qCount">Q 1</div>
  <div class="badge" id="score">Score 0</div>
  <div class="badge" id="streak">Streak 0</div>
  <div class="badge" id="acc">Accuracy 0%</div>
</div>

<div class="question" id="question">Double 0</div>

<div class="center">
  <input id="answer" class="input">
  <br><br>
  <button id="submit" class="primary">Submit</button>
  <button id="next" disabled>Next</button>
</div>

</div>

</div>

<div id="popup" class="popup" style="display:none"></div>

<script>
const $=s=>document.querySelector(s);
const rnd=(a,b)=>Math.floor(Math.random()*(b-a+1))+a;

let session;

function genWhole(d){
  let min=Math.pow(10,d-1);
  let max=Math.pow(10,d)-1;
  return rnd(min,max);
}

function genDecimal(dp){
  let whole=rnd(1,99);
  let dec=rnd(0,Math.pow(10,dp)-1).toString().padStart(dp,'0');
  return parseFloat(whole+"."+dec);
}

// 🔥 KEY FIX: halving-friendly generator
function genHalvingWhole(d){
  let min=Math.pow(10,d-1);
  let max=Math.pow(10,d)-1;

  let n;
  do{
    n=rnd(min,max);
  }while(n % 2 !== 0); // ensure even

  return n;
}

function genHalvingDecimal(dp){
  // ensures clean halving (no messy decimals)
  let n;
  do{
    n=genDecimal(dp);
  }while((n*10**dp) % 2 !== 0);

  return n;
}

function buildSet(){
  const list=[];
  const skill=$('#skill').value;
  const type=$('#type').value;

  for(let i=0;i<20;i++){
    let useSkill = skill==="mix" ? (Math.random()<0.5?"double":"half") : skill;
    let useType = type==="mix" ? (Math.random()<0.5?"whole":"decimal") : type;

    let n;

    if(useSkill==="half"){
      if(useType==="whole"){
        n=genHalvingWhole(+$('#digits').value);
      }else{
        n=genHalvingDecimal(+$('#decimals').value);
      }
    }else{
      if(useType==="whole"){
        n=genWhole(+$('#digits').value);
      }else{
        n=genDecimal(+$('#decimals').value);
      }
    }

    list.push({n,skill:useSkill});
  }

  return list;
}

function start(){
  const pool=buildSet();

  session={
    pool:[...pool],
    remaining:[...pool],
    asked:0,
    correct:0,
    score:0,
    streak:0,
    current:null,
    await:false,
    session:$('#session').value
  };

  $('#game').style.display='block';
  next();
}

function next(){
  if(session.remaining.length===0){
    if(session.session==='endless'){
      session.remaining=[...session.pool];
    }else{
      alert("Session Complete!");
      start();
      return;
    }
  }

  const i=rnd(0,session.remaining.length-1);
  session.current=session.remaining.splice(i,1)[0];

  let text = session.current.skill==="double"
    ? "Double "+session.current.n
    : "Half of "+session.current.n;

  $('#question').textContent=text;
  $('#answer').value='';
  $('#answer').focus();

  $('#next').disabled=true;
  $('#submit').disabled=false;
  session.await=false;
}

function popup(msg,ok){
  const el=$('#popup');
  el.textContent=msg;
  el.className="popup "+(ok?'ok':'no');
  el.style.display='block';
  setTimeout(()=>el.style.display='none',1000);
}

function check(){
  if(session.await) return;

  let input=$('#answer').value.trim().replace(',','.');
  if(input==='') return;

  const val=parseFloat(input);
  const correct = session.current.skill==="double"
    ? session.current.n*2
    : session.current.n/2;

  session.asked++;

  if(Math.abs(val-correct)<0.0001){
    popup("Correct",true);
    session.correct++;
    session.streak++;
    session.score+=10;
  }else{
    popup("Wrong: "+correct,false);
    session.streak=0;
    session.remaining.push(session.current);
  }

  updateStats();

  session.await=true;
  $('#submit').disabled=true;
  $('#next').disabled=false;
}

function updateStats(){
  $('#score').textContent="Score "+session.score;
  $('#streak').textContent="Streak "+session.streak;
  let acc=Math.round(100*session.correct/session.asked||0);
  $('#acc').textContent="Accuracy "+acc+"%";
  $('#qCount').textContent="Q "+(session.asked+1);
}

$('#submit').onclick=check;
$('#next').onclick=next;

$('#answer').addEventListener('keydown',e=>{
  if(e.key==='Enter'){
    if(session.await) next();
    else check();
  }
});

$('#answer').addEventListener('input',()=>{
  if(!$('#instant').checked) return;
  let v=$('#answer').value.replace(',','.');
  let correct = session.current.skill==="double"
    ? session.current.n*2
    : session.current.n/2;
  if(parseFloat(v)===correct) check();
});

window.onload=start;
</script>

</body>
</html>
